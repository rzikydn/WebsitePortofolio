<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Preloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <nav class="floating-navbar">
        <div class="nav-group">
            <a href="#" class="nav-item active">
                <i class="ph ph-house"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="ph ph-user"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="ph ph-code"></i>
            </a>
        </div>
        <div class="nav-divider"></div>
        <div class="nav-group">
            <a href="#" class="nav-item">
                <i class="ph ph-github-logo"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="ph-fill ph-linkedin-logo"></i>
            </a>
        </div>
        <div class="nav-divider"></div>
        <div class="nav-group">
            <button class="theme-toggle">
                <i class="ph ph-sun"></i>
            </button>
            <button class="btn-hire">
                <i class="ph ph-plus-circle"></i>
                Hire Me
            </button>
        </div>
    </nav>


    <!-- Preloader Overlay -->
    <div class="preloader-wrap">
        <div class="preloader-bg"></div>
        <div class="greeting-container">
            <span class="dot">•</span>
            <span class="greeting" id="greeting-text">Hello</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Background Elements -->
        <div class="bg-zigzag"></div>

        <!-- Konten Website (di atas background) -->
        <div class="content-wrapper">



            <div class="hero-card">
                <div class="hero-top">
                    <div class="hero-role">
                        <span class="role-dot"></span>
                        Data Analyst Enthusiast
                    </div>
                </div>

                <div class="hero-main">
                    <div class="hero-content">
                        <h1 class="hero-title">I'M WILDAN<br>RIZKY WIJAYA</h1>
                        <p class="hero-desc">Data Analyst from Jakarta, ID. Currently analyzing data and creating
                            insights.</p>

                        <div class="hero-buttons">
                            <button class="btn-hire">
                                <i class="ph ph-plus-circle"></i>
                                Hire Me
                            </button>
                            <button class="btn-copy">
                                <i class="ph ph-copy"></i>
                                Copy Email
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Tempat render untuk Progressive Blur -->
        <div id="progressive-blur-root"
            style="position: absolute; bottom: 0; left: 0; width: 100%; height: 120px; pointer-events: none; z-index: 2;">
        </div>

        <!-- Lanyard 3D Component -->
        <div id="lanyard-root"></div>
    </div>

    <!-- About Section Wrapper for sticky effect -->
    <div class="about-wrapper">
        <div class="about-section">
            <!-- Progressive Blur Top -->
            <div id="progressive-blur-top-root"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 250px; pointer-events: none; z-index: 1;">
            </div>

            <div class="about-container">
                <div id="scroll-reveal-root"></div>
            </div>
        </div>
    </div>

    <!-- Black Section Overlay -->
    <div class="black-section">
        <h2 class="bg-text">MY WORKS</h2>
        <div id="flowing-menu-root" style="width: 100%; height: 60vh; position: relative; z-index: 20;"></div>
    </div>

    <!-- Skills Section -->
    <div class="skills-section">
        <h2 class="bg-text">TECHNICAL SKILL</h2>
        <div id="logo-loop-root" style="width: 100%; position: relative; z-index: 20; margin-top: 9rem;"></div>
    </div>

    <!-- Experience Section -->
    <div class="experience-section">
        <h2 class="bg-text">MY EXPERIENCE</h2>

        <div id="experience-root"></div>
    </div>

    <script type="module" src="./script.js"></script>
    <script type="module" src="/main.jsx"></script>
</body>

</html>
